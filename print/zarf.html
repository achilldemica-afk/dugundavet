<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Banu & Barış — Zarf (Matbaa)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #fcfbf7;     /* Beyaza yakın bristol */
  --ink: #1c1c1c;       /* Siyaha yakın koyu */
  --ink-soft: #3a3a3a;  /* Tarih/çizgi için biraz daha soft */
}

@page {
  /* 11 x 16 cm trim + 3 mm bleed = 116 x 166 mm */
  size: 116mm 166mm;
  margin: 0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #777;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}

.envelope {
  position: relative;
  width: 116mm;
  height: 166mm;
  background: var(--paper);
  overflow: hidden;
  box-shadow: 0 6px 32px rgba(0,0,0,0.4);
  font-family: 'Montserrat', sans-serif;
}

/* Ekrandaki kesim çizgisi - basılmaz */
.envelope::before {
  content: '';
  position: absolute;
  inset: 3mm;
  border: 1px dashed rgba(45,80,22,0.15);
  pointer-events: none;
  z-index: 100;
}
@media print {
  body { background: #fff; padding: 0; }
  .envelope { box-shadow: none; }
  .envelope::before { display: none; }
}

/* Merkez içerik */
.content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18mm 10mm;
}

/* İsimler bloğu - çapraz/diagonal yerleşim, ALTIN YALDIZ */
.names {
  display: flex;
  flex-direction: column;
  width: 100%;
  margin-bottom: 14mm;
}

.name-first,
.name-last,
.name-amp {
  /* Düz altın renk - matbaada gerçek altın yaldız (foil) uygulanacak.
     Mobil PDF okuyucularda raster sorunu yaşamamak için gradient yok. */
  color: #b89344;
}

.name-first {
  display: block;
  font-family: 'Pinyon Script', cursive;
  font-weight: 400;
  font-size: 60pt;
  line-height: 1;
  align-self: flex-start;
  padding-left: 8mm;
  letter-spacing: 1px;
}

.name-amp {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 26pt;
  line-height: 1;
  align-self: center;
  margin: 2mm 0 -1mm;
}

.name-last {
  display: block;
  font-family: 'Pinyon Script', cursive;
  font-weight: 400;
  font-size: 60pt;
  line-height: 1;
  align-self: flex-end;
  padding-right: 8mm;
  letter-spacing: 1px;
}

/* Tarih satırı - iki çizgi arasında */
.date-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5mm;
}
.date-row .line {
  width: 18mm;
  height: 0.3mm;
  background: var(--ink-soft);
}
.date {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 9pt;
  letter-spacing: 3.5px;
  color: var(--ink-soft);
  text-indent: 3.5px;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="envelope">
  <div class="content">
    <div class="names">
      <span class="name-first">Banu</span>
      <span class="name-amp">&amp;</span>
      <span class="name-last">Barış</span>
    </div>
    <div class="date-row">
      <span class="line"></span>
      <span class="date">11 TEMMUZ 2026</span>
      <span class="line"></span>
    </div>
  </div>
</div>
</body>
</html>
