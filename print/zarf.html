<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Banu & Barış — Zarf (Matbaa)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #2d5016;
  --green-medium: #4a7c2e;
  --green-light: #a8d5a2;
  --cream: #fdf6e3;
  --cream-dark: #f5ecd3;
  --gold: #c9a84c;
  --gold-light: #e2cc7e;
  --gold-dark: #a68a2e;
  --gold-deep: #8a6e1e;
}

@page {
  /* 19 x 14 cm trim + 3 mm bleed = 196 x 146 mm */
  size: 196mm 146mm;
  margin: 0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #777;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}

.envelope {
  position: relative;
  width: 196mm;
  height: 146mm;
  background: var(--cream);
  overflow: hidden;
  box-shadow: 0 6px 32px rgba(0,0,0,0.4);
  font-family: 'Lato', sans-serif;
}

/* Ekrandaki kesim çizgisi - basılmaz */
.envelope::before {
  content: '';
  position: absolute;
  inset: 3mm;
  border: 1px dashed rgba(45,80,22,0.25);
  pointer-events: none;
  z-index: 100;
}
@media print {
  body { background: #fff; padding: 0; }
  .envelope { box-shadow: none; }
  .envelope::before { display: none; }
}

/* İnce ikinci çerçeve - dekoratif */
.frame {
  position: absolute;
  inset: 10mm;
  border: 0.4mm solid var(--green-light);
  opacity: 0.7;
}
.frame::before, .frame::after {
  content: '';
  position: absolute;
  width: 18mm;
  height: 0.4mm;
  background: var(--cream);
}
.frame::before { top: -0.4mm; left: 50%; transform: translateX(-50%); }
.frame::after  { bottom: -0.4mm; left: 50%; transform: translateX(-50%); }

/* Merkez içerik */
.content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16mm;
}

/* Üst çiçekli motif */
.floral-top {
  margin-bottom: 6mm;
  opacity: 0.85;
}

/* İsimler - ALTIN YALDIZ */
.names {
  font-family: 'Great Vibes', cursive;
  font-weight: 400;
  font-size: 70pt;
  line-height: 1;
  /* Yaldız hissi için metallic gold gradient
     Matbaada gerçek altın foil uygulanacak */
  color: var(--gold);
  background: linear-gradient(135deg,
    #a68a2e 0%,
    #d9b860 25%,
    #f0d57e 45%,
    #e2cc7e 55%,
    #c9a84c 75%,
    #8a6e1e 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Alt ayırıcı */
.divider-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4mm;
  margin: 5mm 0 4mm;
}
.divider-line::before,
.divider-line::after {
  content: '';
  width: 22mm;
  height: 0.4mm;
  background: var(--gold);
  opacity: 0.6;
}
.divider-line .diamond {
  width: 2mm;
  height: 2mm;
  background: var(--gold);
  transform: rotate(45deg);
  opacity: 0.7;
}

/* Tarih */
.date {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: 14pt;
  letter-spacing: 8px;
  color: var(--green-dark);
  text-indent: 8px; /* tracking'i ortalamak için */
}
</style>
</head>
<body>
<div class="envelope">
  <div class="frame"></div>
  <div class="content">

    <div class="floral-top">
      <svg viewBox="0 0 260 32" width="120" height="14">
        <path d="M0,16 Q65,2 130,16 Q195,30 260,16" stroke="#a8d5a2" fill="none" stroke-width="1.4"/>
        <circle cx="130" cy="16" r="4" fill="#c9a84c"/>
        <path d="M118,16 Q124,8 130,12 Q136,8 142,16" stroke="#2d5016" fill="none" stroke-width="1"/>
        <path d="M118,16 Q124,24 130,20 Q136,24 142,16" stroke="#2d5016" fill="none" stroke-width="1"/>
        <circle cx="20"  cy="16" r="1.6" fill="#c9a84c" opacity="0.7"/>
        <circle cx="240" cy="16" r="1.6" fill="#c9a84c" opacity="0.7"/>
      </svg>
    </div>

    <h1 class="names">Banu &amp; Barış</h1>

    <div class="divider-line">
      <span class="diamond"></span>
    </div>

    <p class="date">11 . 07 . 2026</p>

  </div>
</div>
</body>
</html>
