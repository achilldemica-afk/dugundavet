<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Banu & Barış — Zarf (Matbaa)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #fdf6e3;
  --paper: #fbf5e7;     /* Bristol fildişi tonu */
  --gold: #c9a84c;
  --gold-mid: #b89344;
  --gold-deep: #8a6e1e;
  --text-dark: #2c2c2c;
}

@page {
  /* 11 x 16 cm trim + 3 mm bleed = 116 x 166 mm */
  size: 116mm 166mm;
  margin: 0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #777;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}

.envelope {
  position: relative;
  width: 116mm;
  height: 166mm;
  background: var(--paper);
  overflow: hidden;
  box-shadow: 0 6px 32px rgba(0,0,0,0.4);
  font-family: 'Montserrat', sans-serif;
}

/* Ekrandaki kesim çizgisi - basılmaz */
.envelope::before {
  content: '';
  position: absolute;
  inset: 3mm;
  border: 1px dashed rgba(45,80,22,0.18);
  pointer-events: none;
  z-index: 100;
}
@media print {
  body { background: #fff; padding: 0; }
  .envelope { box-shadow: none; }
  .envelope::before { display: none; }
}

/* Merkez içerik - hafif üst-orta */
.content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 18mm 14mm;
}

/* İsimler - ALTIN YALDIZ (matbaada gold foil uygulanacak) */
.names {
  font-family: 'Allura', cursive;
  font-weight: 400;
  font-size: 48pt;
  line-height: 1;
  white-space: nowrap;
  color: var(--gold-mid);
  background: linear-gradient(135deg,
    #a08237 0%,
    #c9a84c 25%,
    #e8cf83 50%,
    #c9a84c 75%,
    #8a6e1e 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10mm;
}

/* Tarih satırı - iki altın çizgi arasında */
.date-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5mm;
}
.date-row .line {
  width: 16mm;
  height: 0.35mm;
  background: var(--gold-mid);
}
.date {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 9.5pt;
  letter-spacing: 4px;
  color: var(--gold-mid);
  text-indent: 4px; /* tracking telafisi */
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="envelope">
  <div class="content">
    <h1 class="names">Banu &amp; Barış</h1>
    <div class="date-row">
      <span class="line"></span>
      <span class="date">11 TEMMUZ 2026</span>
      <span class="line"></span>
    </div>
  </div>
</div>
</body>
</html>
